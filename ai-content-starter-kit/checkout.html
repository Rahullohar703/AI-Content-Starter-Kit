<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout — AI Content Starter Kit</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .checkout-page {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 40px 20px; position: relative;
    }
    .checkout-page .cta-glow {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 700px; height: 700px; border-radius: 50%;
      background: radial-gradient(circle, rgba(124,92,255,0.1) 0%, transparent 70%);
      pointer-events: none;
    }
    .checkout-box {
      background: rgba(17,17,17,0.85); border: 1px solid rgba(124,92,255,0.2);
      border-radius: 20px; padding: 48px 40px; text-align: center;
      max-width: 480px; width: 100%; position: relative; z-index: 2;
      backdrop-filter: blur(12px);
    }
    .checkout-box::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 20px 20px 0 0;
    }
    .checkout-box h1 { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
    .checkout-box .price-display { margin: 24px 0; }
    .checkout-box .old-price { font-size: 20px; color: var(--text-dim); text-decoration: line-through; }
    .checkout-box .price { font-size: 56px; font-weight: 900; letter-spacing: -2px; }
    .checkout-box .price-sub { font-size: 14px; color: var(--text-muted); margin-top: 4px; }
    .checkout-box .razorpay-btn-wrap { margin: 28px 0 20px; }
    .checkout-box .secure { font-size: 13px; color: var(--text-dim); margin-top: 16px; }
    .checkout-box .back-link {
      display: inline-block; margin-top: 20px; font-size: 14px;
      color: var(--text-muted); text-decoration: none; transition: color .25s;
    }
    .checkout-box .back-link:hover { color: var(--accent); }
    .checkout-features { list-style: none; text-align: left; margin: 24px 0; }
    .checkout-features li {
      padding: 8px 0; font-size: 14px; color: var(--text-muted);
      display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .checkout-features li::before { content: '✓'; color: var(--accent); font-weight: 700; }
    @media (max-width: 480px) {
      .checkout-box { padding: 32px 20px; }
      .checkout-box .price { font-size: 44px; }
      .checkout-box h1 { font-size: 22px; }
    }
  </style>
</head>
<body>

<canvas id="particles"></canvas>

<div class="checkout-page">
  <div class="cta-glow"></div>
  <div class="checkout-box">
    <h1>AI Content <span class="gradient-text">Starter Kit</span></h1>
    <div class="price-display">
      <div class="old-price">₹999</div>
      <div class="price gradient-text">₹49</div>
      <div class="price-sub">One-time payment · Instant delivery</div>
    </div>
    <ul class="checkout-features">
      <li>Complete AI Content System</li>
      <li>5 Ready-to-Use Files</li>
      <li>8 Powerful Commands</li>
      <li>Brand Memory Configuration</li>
      <li>No Subscription — Ever</li>
    </ul>
    <div class="razorpay-btn-wrap">
      <form><script src="https://checkout.razorpay.com/v1/payment-button.js" data-payment_button_id="pl_SnFAVWl4PBfO9S" async> </script> </form>
    </div>
    <div class="secure">🔒 Secure payment via Razorpay</div>
    <a href="index.html" class="back-link">← Back to homepage</a>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
